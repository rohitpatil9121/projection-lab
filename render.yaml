services:
  - type: web
    name: projectlab-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm run start -w api
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
